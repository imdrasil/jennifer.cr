name: Docs generation

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Generate and publish docs"
        uses: imdrasil/release-docs-action@main
        with:
          project_name: jennifer.cr
          github_token: ${{ secrets.DOC_KEY }}
